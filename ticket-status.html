<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ticket Status | RailConnect</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .form-container {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 20px;
            margin-bottom: 30px;
        }

        .form-wrapper {
            flex: 0 0 600px;
            max-width: 600px;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.8em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .header p {
            font-size: 1.2em;
            opacity: 0.95;
            font-weight: 300;
        }

        .pnr-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.25);
            margin-bottom: 30px;
            transition: transform 0.3s ease;
        }

        .pnr-card:hover {
            transform: translateY(-5px);
        }

        .card-title {
            font-size: 1.8em;
            color: #333;
            margin-bottom: 25px;
            font-weight: 600;
            text-align: center;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-label {
            display: block;
            font-size: 1em;
            font-weight: 600;
            color: #444;
            margin-bottom: 8px;
        }

        .form-label .required {
            color: #e74c3c;
        }

        .form-input {
            width: 100%;
            padding: 18px;
            font-size: 18px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            transition: all 0.3s ease;
            font-family: inherit;
            text-align: center;
            letter-spacing: 2px;
            font-weight: 600;
        }

        .form-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-input::placeholder {
            letter-spacing: normal;
            font-weight: normal;
        }

        .error-message {
            color: #e74c3c;
            font-size: 0.9em;
            margin-top: 5px;
            display: none;
        }

        .btn-check {
            flex: 1;
            padding: 18px;
            font-size: 18px;
            font-weight: 700;
            color: white;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-check:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .btn-check:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 10px;
        }

        .btn-reset {
            flex: 1;
            padding: 18px;
            font-size: 16px;
            font-weight: 600;
            color: white;
            background: linear-gradient(135deg, #8B4513 0%, #D2691E 100%);
            border: 2px solid #D2691E;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(139, 69, 19, 0.3);
        }

        .btn-reset:hover {
            background: linear-gradient(135deg, #D2691E 0%, #A0522D 100%);
            border-color: #A0522D;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(210, 105, 30, 0.4);
        }

        .btn-reset:active {
            transform: translateY(0);
        }

        /* Overlay for arithmetic question */
        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .verification-box {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 450px;
            width: 90%;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                transform: translate(-50%, -60%);
                opacity: 0;
            }
            to {
                transform: translate(-50%, -50%);
                opacity: 1;
            }
        }

        .verification-box h3 {
            color: #333;
            font-size: 1.5em;
            margin-bottom: 20px;
            text-align: center;
        }

        .math-question {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            font-size: 2em;
            font-weight: 700;
            margin-bottom: 25px;
            letter-spacing: 3px;
        }

        .answer-input {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .answer-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .verification-buttons {
            display: flex;
            gap: 15px;
        }

        .btn-verify,
        .btn-cancel {
            flex: 1;
            padding: 15px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-verify {
            background: linear-gradient(135deg, #4ade80 0%, #22c55e 100%);
            color: white;
        }

        .btn-verify:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(34, 197, 94, 0.4);
        }

        .btn-cancel {
            background: #e5e7eb;
            color: #333;
        }

        .btn-cancel:hover {
            background: #d1d5db;
        }

        .verification-error {
            color: #e74c3c;
            text-align: center;
            margin-top: 10px;
            font-weight: 600;
            display: none;
        }

        /* Status display section */
        .status-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.25);
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .status-header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
        }

        .pnr-display {
            font-size: 1.8em;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 10px;
        }

        .train-info {
            font-size: 1.2em;
            color: #666;
            margin-bottom: 5px;
        }

        .passenger-list {
            margin-top: 20px;
        }

        .passenger-item {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 15px;
            border-left: 4px solid #667eea;
            transition: all 0.3s ease;
        }

        .passenger-item:hover {
            background: #e9ecef;
            transform: translateX(5px);
        }

        .passenger-name {
            font-size: 1.2em;
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
        }

        .passenger-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 10px;
        }

        .detail-item {
            display: flex;
            flex-direction: column;
        }

        .detail-label {
            font-size: 0.85em;
            color: #888;
            margin-bottom: 3px;
        }

        .detail-value {
            font-size: 1em;
            font-weight: 600;
            color: #333;
        }

        .status-badge {
            display: inline-block;
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: 600;
        }

        .status-confirmed {
            background: #d1fae5;
            color: #065f46;
        }

        .status-rac {
            background: #fef3c7;
            color: #92400e;
        }

        .status-waiting {
            background: #fee2e2;
            color: #991b1b;
        }

        .btn-irctc {
            width: 100%;
            padding: 18px;
            font-size: 18px;
            font-weight: 700;
            color: white;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 25px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-irctc:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(245, 87, 108, 0.4);
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 2em;
            }

            .form-container {
                flex-direction: column;
                align-items: center;
            }

            .form-wrapper {
                flex: none;
                max-width: 100%;
                width: 100%;
            }

            .button-group {
                flex-direction: column;
                gap: 10px;
            }

            .pnr-card,
            .status-card {
                padding: 25px;
            }

            .card-title {
                font-size: 1.5em;
            }

            .verification-box {
                padding: 30px 20px;
            }

            .math-question {
                font-size: 1.5em;
                padding: 20px;
            }

            .passenger-details {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎫 Check Ticket Status</h1>
            <p>Enter your PNR to view booking details</p>
        </div>

        <div class="form-container">
            <div class="form-wrapper">
        <div class="pnr-card">
            <h2 class="card-title">PNR Status Enquiry</h2>
            
            <form id="pnrForm" onsubmit="handlePNRSubmit(event)">
                <div class="form-group">
                    <label class="form-label" for="pnrNumber">
                        <span>🔢</span> 10-Digit PNR Number <span class="required">*</span>
                    </label>
                    <input 
                        type="text" 
                        id="pnrNumber" 
                        class="form-input" 
                        placeholder="Enter 10-digit PNR"
                        maxlength="10"
                        pattern="[0-9]{10}"
                        required
                    >
                    <div class="error-message" id="pnrError">Please enter a valid 10-digit PNR number</div>
                </div>

                        <div class="button-group">
                <button type="submit" class="btn-check">
                    🔍 Check Status
                </button>
                            <button type="button" class="btn-reset" onclick="resetPage()">
                                🔄 Reset
                            </button>
                        </div>
            </form>
                </div>
            </div>
        </div>

        <!-- Status display card (hidden initially) -->
        <div class="status-card" id="statusCard">
            <div class="status-header">
                <div class="pnr-display" id="displayPNR"></div>
                <div class="train-info" id="trainInfo"></div>
            </div>

            <div class="passenger-list" id="passengerList"></div>

            <button class="btn-irctc" onclick="redirectToIRCTC()">
                🌐 View on IRCTC Official Site
            </button>
        </div>
    </div>

    <!-- Verification overlay -->
    <div class="overlay" id="verificationOverlay">
        <div class="verification-box">
            <h3>🔐 Security Verification</h3>
            <div class="math-question" id="mathQuestion"></div>
            <input 
                type="number" 
                class="answer-input" 
                id="answerInput" 
                placeholder="Enter your answer"
            >
            <div class="verification-error" id="verificationError">
                ❌ Incorrect answer. Please try again.
            </div>
            <div class="verification-buttons">
                <button class="btn-verify" onclick="verifyAnswer()">✓ Verify</button>
                <button class="btn-cancel" onclick="cancelVerification()">✕ Cancel</button>
            </div>
        </div>
    </div>

    <script>
        // Mock PNR data for demonstration
        const mockPNRData = {
            '1234567890': {
                trainNumber: '12301',
                trainName: 'Rajdhani Express',
                from: 'New Delhi',
                to: 'Howrah',
                dateOfJourney: '15-11-2025',
                passengers: [
                    {
                        name: 'Rahul Kumar',
                        age: 28,
                        gender: 'Male',
                        status: 'Confirmed',
                        coach: 'A1',
                        berth: '23',
                        berthType: 'Lower Berth'
                    },
                    {
                        name: 'Priya Sharma',
                        age: 25,
                        gender: 'Female',
                        status: 'Confirmed',
                        coach: 'A1',
                        berth: '24',
                        berthType: 'Upper Berth'
                    }
                ]
            },
            '9876543210': {
                trainNumber: '12302',
                trainName: 'Howrah Rajdhani',
                from: 'Howrah',
                to: 'New Delhi',
                dateOfJourney: '18-11-2025',
                passengers: [
                    {
                        name: 'Amit Patel',
                        age: 35,
                        gender: 'Male',
                        status: 'RAC',
                        coach: 'B2',
                        berth: 'RAC 15',
                        berthType: 'Side Lower'
                    }
                ]
            },
            '5555666677': {
                trainNumber: '12002',
                trainName: 'Shatabdi Express',
                from: 'New Delhi',
                to: 'Bhopal',
                dateOfJourney: '20-11-2025',
                passengers: [
                    {
                        name: 'Sneha Singh',
                        age: 30,
                        gender: 'Female',
                        status: 'Waiting',
                        coach: 'WL',
                        berth: 'WL 8',
                        berthType: 'Waiting List'
                    }
                ]
            }
        };

        let currentPNR = '';
        let correctAnswer = 0;

        // Handle PNR form submission
        function handlePNRSubmit(event) {
            event.preventDefault();
            
            const pnrInput = document.getElementById('pnrNumber');
            const pnr = pnrInput.value.trim();
            
            // Validate PNR format (must be exactly 10 digits)
            if (!/^\d{10}$/.test(pnr)) {
                document.getElementById('pnrError').style.display = 'block';
                return;
            }
            
            document.getElementById('pnrError').style.display = 'none';
            currentPNR = pnr;
            
            // Show arithmetic verification overlay
            showVerification();
        }

        // Generate and display random arithmetic question
        function showVerification() {
            // Generate two random 2-digit numbers
            let num1 = Math.floor(Math.random() * 90) + 10; // 10-99
            let num2 = Math.floor(Math.random() * 90) + 10; // 10-99
            
            // Randomly choose operation (addition or subtraction)
            const operations = ['+', '-'];
            const operation = operations[Math.floor(Math.random() * operations.length)];
            
            // Calculate correct answer and ensure it's not negative
            if (operation === '+') {
                correctAnswer = num1 + num2;
            } else {
                // For subtraction, ensure num1 >= num2 to avoid negative results
                if (num1 >= num2) {
                    correctAnswer = num1 - num2;
                } else {
                    // Swap numbers if num1 < num2 to ensure positive result
                    correctAnswer = num2 - num1;
                    // Update the question to reflect the swap
                    const temp = num1;
                    num1 = num2;
                    num2 = temp;
                }
            }
            
            // Display question in overlay
            document.getElementById('mathQuestion').textContent = `${num1} ${operation} ${num2} = ?`;
            document.getElementById('answerInput').value = '';
            document.getElementById('verificationError').style.display = 'none';
            document.getElementById('verificationOverlay').style.display = 'block';
            
            // Focus on answer input
            setTimeout(() => {
                document.getElementById('answerInput').focus();
            }, 300);
        }

        // Verify user's answer to arithmetic question
        function verifyAnswer() {
            const userAnswer = parseInt(document.getElementById('answerInput').value);
            
            // Debug logging
            console.log('User answer:', userAnswer);
            console.log('Correct answer:', correctAnswer);
            console.log('Answer type:', typeof userAnswer, typeof correctAnswer);
            
            // Check if user entered a valid number
            if (isNaN(userAnswer)) {
                document.getElementById('verificationError').textContent = '❌ Please enter a valid number';
                document.getElementById('verificationError').style.display = 'block';
                return;
            }
            
            // Check if answer is correct
            if (userAnswer === correctAnswer) {
                console.log('Answer is correct!');
                closeVerification();
                displayTicketStatus();
            } else {
                console.log('Answer is incorrect');
                // Show error message if answer is wrong
                document.getElementById('verificationError').textContent = `❌ Incorrect answer. The correct answer is ${correctAnswer}. Please try again.`;
                document.getElementById('verificationError').style.display = 'block';
                document.getElementById('answerInput').value = '';
                document.getElementById('answerInput').focus();
            }
        }

        // Close verification overlay
        function closeVerification() {
            document.getElementById('verificationOverlay').style.display = 'none';
        }

        // Cancel verification and reset form
        function cancelVerification() {
            closeVerification();
            // Reset the form
            document.getElementById('pnrForm').reset();
            document.getElementById('pnrNumber').focus();
        }

        // Display ticket status using mock data
        function displayTicketStatus() {
            const data = mockPNRData[currentPNR];
            
            // If PNR not found in mock data, create generic data
            const ticketData = data || {
                trainNumber: '12345',
                trainName: 'Express Train',
                from: 'Station A',
                to: 'Station B',
                dateOfJourney: '01-12-2025',
                passengers: [
                    {
                        name: 'Passenger Name',
                        age: 30,
                        gender: 'Male',
                        status: 'Confirmed',
                        coach: 'S1',
                        berth: '45',
                        berthType: 'Lower Berth'
                    }
                ]
            };
            
            // Display PNR and train info
            document.getElementById('displayPNR').textContent = `PNR: ${currentPNR}`;
            document.getElementById('trainInfo').innerHTML = `
                <strong>${ticketData.trainNumber} - ${ticketData.trainName}</strong><br>
                ${ticketData.from} → ${ticketData.to} | Journey Date: ${ticketData.dateOfJourney}
            `;
            
            // Display passenger details
            const passengerListHTML = ticketData.passengers.map(passenger => {
                const statusClass = passenger.status === 'Confirmed' ? 'status-confirmed' :
                                  passenger.status === 'RAC' ? 'status-rac' : 'status-waiting';
                
                return `
                    <div class="passenger-item">
                        <div class="passenger-name">${passenger.name}</div>
                        <div class="passenger-details">
                            <div class="detail-item">
                                <span class="detail-label">Age / Gender</span>
                                <span class="detail-value">${passenger.age} / ${passenger.gender}</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">Status</span>
                                <span class="status-badge ${statusClass}">${passenger.status}</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">Coach</span>
                                <span class="detail-value">${passenger.coach}</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">Berth</span>
                                <span class="detail-value">${passenger.berth} (${passenger.berthType})</span>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
            
            document.getElementById('passengerList').innerHTML = passengerListHTML;
            
            // Show status card
            document.getElementById('statusCard').style.display = 'block';
            
            // Scroll to status card
            document.getElementById('statusCard').scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        // Redirect to IRCTC PNR status page with current PNR
        function redirectToIRCTC() {
            // IRCTC PNR enquiry URL with PNR parameter
            const irctcURL = `https://indianrail.gov.in/enquiry/PNR/PnrEnquiry.html?locale=en2,${currentPNR}`;
            
            // Open in new tab
            window.open(irctcURL, '_blank');
        }

        // Clear error on input
        document.getElementById('pnrNumber').addEventListener('input', function() {
            document.getElementById('pnrError').style.display = 'none';
        });

        // Allow Enter key to verify answer
        document.getElementById('answerInput').addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                verifyAnswer();
            }
        });

        // Close overlay when clicking outside verification box
        document.getElementById('verificationOverlay').addEventListener('click', function(event) {
            if (event.target === this) {
                closeVerification();
            }
        });

        // Reset page function
        function resetPage() {
            // Clear PNR input
            document.getElementById('pnrNumber').value = '';
            
            // Hide error messages
            document.getElementById('pnrError').style.display = 'none';
            
            // Hide status card
            document.getElementById('statusCard').style.display = 'none';
            
            // Close any open verification overlay
            closeVerification();
            
            // Reset form state
            document.getElementById('pnrForm').reset();
            
            // Scroll to top
            window.scrollTo({ top: 0, behavior: 'smooth' });
            
            // Focus on PNR input
            document.getElementById('pnrNumber').focus();
        }
    </script>
</body>
</html>
