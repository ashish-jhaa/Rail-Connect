<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Train Travel Planner</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #a2c1d3;
            color: #333;
            transition: background 0.3s, color 0.3s;
        }

        header {
            height: 10vh;
            background: linear-gradient(90deg, darkblue, purple);
            color: white;
            padding: 1px 3vw;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
         .theme-toggle {
            /* display: block; */
            width: 12vw;
            display: inline;
            margin: 2px 15px;
            padding: 8px 2px;
            background: #333;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .slideshow {
            position: relative;
            max-width: 100vw;
            margin: auto;
            margin-top: 1vh;
            height: 45vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: space-evenly;
        }

        .slide {
            display: none;
            position: absolute;
            width: 45vw;
            height: 45vh;
        }

        .slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .caption {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.6);
            color: #fff;
            padding: 10px;
            border-radius: 5px;
        }

        .form-container {
            max-width: 500px;
            margin: 30px auto;
            padding: 20px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        .form-container h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        select,
        input[type="date"],
        button {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            font-size: 16px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            background: #0077b6;
            color: white;
            border: none;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #023e8a;
        }

        #result {
            margin-top: 15px;
            text-align: center;
            font-weight: bold;
        }

        body.dark {
            background: #1e1e1e;
            color: #eee;
        }

        body.dark header {
            /* background: linear-gradient(90deg, #333, #555); */
            background: linear-gradient(90deg, darkblue, purple);
        }

        body.dark .form-container {
            background: #2c2c2c;
            color: white;
        }

        body.dark button {
            background: #0077b6;
        }

       
    </style>
</head>

<body>

    <header>
        <h1>🚆 Train Travel Planner</h1>
        <button class="theme-toggle" onclick="toggleTheme()">Change Theme</button>
    </header>

    <div class="slideshow">
        <div class="slide">
            <img src="tajMahal.jpeg" alt="Taj Mahal">
            <div class="caption">Agra - Taj Mahal: A symbol of eternal love ❤️</div>
        </div>
        <div class="slide">
            <img src="gatewayOfIndia.jpeg" alt="Mumbai">
            <div class="caption">Mumbai - Gateway of India & Marine Drive 🌊</div>
        </div>
        <div class="slide">
            <img src="hawaMahal.jpeg" alt="Jaipur">
            <div class="caption">Jaipur - Hawa Mahal: The Pink City 🌸</div>
        </div>
    </div>

    <div class="form-container">
        <h2>Plan Your Trip</h2>
        <label for="fromStation">From Station:</label>
        <select id="fromStation"></select>

        <label for="toStation">To Station:</label>
        <select id="toStation"></select>

        <label for="date">Date of Journey:</label>
        <input type="date" id="date">

        <button onclick="planTrip()">Show Estimated Time & Cost</button>

        <div id="result"></div>
    </div>

    

    <script src="stations.js"></script>
    <script src="routes.js"></script>
    <script>
        /* Slideshow */
        let slideIndex = 0;
        showSlides();
        function showSlides() {
            let slides = document.querySelectorAll(".slide");
            slides.forEach(s => s.style.display = "none");
            slideIndex++;
            if (slideIndex > slides.length) { slideIndex = 1 }
            slides[slideIndex - 1].style.display = "block";
            setTimeout(showSlides, 4000);
        }

        /* Load Stations */
        function loadStations() {
            const fromSelect = document.getElementById("fromStation");
            const toSelect = document.getElementById("toStation");
            window.stations.forEach(st => {
                let opt1 = document.createElement("option");
                opt1.value = st.code;
                opt1.textContent = `${st.name} (${st.code})`;
                fromSelect.appendChild(opt1);

                let opt2 = document.createElement("option");
                opt2.value = st.code;
                opt2.textContent = `${st.name} (${st.code})`;
                toSelect.appendChild(opt2);
            });
        }
        loadStations();

        /* Plan Trip with real distance */
        function planTrip() {
            const from = document.getElementById("fromStation").value;
            const to = document.getElementById("toStation").value;
            const date = document.getElementById("date").value;
            const resultDiv = document.getElementById("result");

            if (!from || !to || !date) {
                resultDiv.textContent = "⚠ Please select all fields.";
                return;
            }
            if (from === to) {
                resultDiv.textContent = "⚠ From and To stations cannot be the same.";
                return;
            }

            const route = window.trains.find(r =>
                (r.from === from && r.to === to) || (r.from === to && r.to === from)
            );

            if (!route) {
                resultDiv.textContent = "❌ Route not available in database.";
                return;
            }

            let distance = route.distance; // in KM
            let speed = 60; // km/h
            let time = (distance / speed).toFixed(1); // hours
            let sleeperCost = Math.round(distance * 1.2);
            let acCost = Math.round(distance * 2);

            resultDiv.innerHTML = `
        📅 Journey on ${date}<br>
        Distance: ${distance} km<br>
        Estimated Time: ${time} hrs<br>
        Sleeper: ₹${sleeperCost} | AC: ₹${acCost}
    `;
        }

        /* Theme Toggle */
        function toggleTheme() {
            document.body.classList.toggle("dark");
        }
    </script>

</body>

</html>
